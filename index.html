<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Blog</title>
  <meta name="description" content="마크다운으로 쓰는 깔끔한 블로그" />

  <!-- 저장된 테마를 렌더 전에 적용해 깜빡임(FOUC) 방지 -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <!-- 코드 하이라이팅 테마 (data-theme에 따라 app.js가 href를 교체) -->
  <link
    id="hljs-theme"
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github.min.css"
  />
  <link rel="stylesheet" href="css/style.css" />

  <!-- 마크다운 파서 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- 코드 하이라이팅 (브라우저 번들) -->
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="site-title" href="#/">My Blog</a>
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        aria-label="테마 전환"
        title="라이트/다크 전환"
      >
        <span class="theme-toggle__icon" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <main id="app" class="container" aria-live="polite">
    <!-- 라우팅에 따라 목록/상세가 렌더됩니다 -->
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> My Blog · 마크다운으로 작성됨</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
